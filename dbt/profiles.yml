# dev = local DuckDB so anyone can run the full project with zero cloud cost.
# prod targets (Redshift / Databricks) are config-only swaps — same models.
multicloud_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: local.duckdb
      threads: 4
