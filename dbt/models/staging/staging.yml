version: 2
models:
  - name: stg_orders
    description: Typed, cleaned order events (grain = one row per order).
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: amount
        tests: [not_null]
      - name: status
        tests:
          - accepted_values:
              values: [completed, returned, cancelled]
  - name: stg_customers
    description: Customer dimension source (grain = one row per customer).
    columns:
      - name: customer_id
        tests: [unique, not_null]
